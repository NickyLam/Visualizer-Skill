<svg viewBox="0 0 680 500" width="680" height="500" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Claude Code Architecture</title>
  <desc>A structural diagram of the Claude Code CLI showing three internal subsystems — Interface Layer, Agent Engine, and Tools &amp; API — each containing four components, with directional arrows indicating the request and response flow between them.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5"
      markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke"
        stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <text x="340" y="32" text-anchor="middle" fill="#E1F5EE" font-family="sans-serif" font-size="15" font-weight="500">Claude Code Architecture</text>
  <text x="340" y="50" text-anchor="middle" fill="#5DCAA5" font-family="sans-serif" font-size="12">Terminal-native agentic coding assistant</text>

  <g>
    <rect x="40" y="72" width="600" height="408" rx="20" fill="#444441" stroke="#B4B2A9" stroke-width="0.5"/>
    <text x="60" y="100" fill="#F1EFE8" font-family="sans-serif" font-size="14" font-weight="500">Claude Code CLI</text>
    <text x="60" y="118" fill="#B4B2A9" font-family="sans-serif" font-size="12">agentic coding loop</text>

    <g>
      <rect x="60" y="140" width="180" height="312" rx="12" fill="#085041" stroke="#5DCAA5" stroke-width="0.5"/>
      <text x="150" y="166" text-anchor="middle" fill="#E1F5EE" font-family="sans-serif" font-size="13" font-weight="500">Interface Layer</text>

      <g>
        <rect x="80" y="184" width="140" height="44" rx="8" fill="#04342C" stroke="#5DCAA5" stroke-width="0.5"/>
        <text x="150" y="206" text-anchor="middle" dominant-baseline="central" fill="#E1F5EE" font-family="sans-serif" font-size="13" font-weight="500">Terminal Input</text>
      </g>
      <g>
        <rect x="80" y="240" width="140" height="44" rx="8" fill="#04342C" stroke="#5DCAA5" stroke-width="0.5"/>
        <text x="150" y="262" text-anchor="middle" dominant-baseline="central" fill="#E1F5EE" font-family="sans-serif" font-size="13" font-weight="500">Stream Renderer</text>
      </g>
      <g>
        <rect x="80" y="296" width="140" height="44" rx="8" fill="#04342C" stroke="#5DCAA5" stroke-width="0.5"/>
        <text x="150" y="318" text-anchor="middle" dominant-baseline="central" fill="#E1F5EE" font-family="sans-serif" font-size="13" font-weight="500">Permission Gate</text>
      </g>
      <g>
        <rect x="80" y="352" width="140" height="44" rx="8" fill="#04342C" stroke="#5DCAA5" stroke-width="0.5"/>
        <text x="150" y="374" text-anchor="middle" dominant-baseline="central" fill="#E1F5EE" font-family="sans-serif" font-size="13" font-weight="500">Slash Commands</text>
      </g>
    </g>

    <g>
      <rect x="250" y="140" width="180" height="312" rx="12" fill="#04342C" stroke="#5DCAA5" stroke-width="0.5"/>
      <text x="340" y="166" text-anchor="middle" fill="#E1F5EE" font-family="sans-serif" font-size="13" font-weight="500">Agent Engine</text>

      <g>
        <rect x="270" y="184" width="140" height="44" rx="8" fill="#085041" stroke="#5DCAA5" stroke-width="0.5"/>
        <text x="340" y="206" text-anchor="middle" dominant-baseline="central" fill="#E1F5EE" font-family="sans-serif" font-size="13" font-weight="500">Agent Loop</text>
      </g>
      <g>
        <rect x="270" y="240" width="140" height="44" rx="8" fill="#085041" stroke="#5DCAA5" stroke-width="0.5"/>
        <text x="340" y="262" text-anchor="middle" dominant-baseline="central" fill="#E1F5EE" font-family="sans-serif" font-size="13" font-weight="500">Context Manager</text>
      </g>
      <g>
        <rect x="270" y="296" width="140" height="44" rx="8" fill="#085041" stroke="#5DCAA5" stroke-width="0.5"/>
        <text x="340" y="318" text-anchor="middle" dominant-baseline="central" fill="#E1F5EE" font-family="sans-serif" font-size="13" font-weight="500">Tool Router</text>
      </g>
      <g>
        <rect x="270" y="352" width="140" height="44" rx="8" fill="#085041" stroke="#5DCAA5" stroke-width="0.5"/>
        <text x="340" y="374" text-anchor="middle" dominant-baseline="central" fill="#E1F5EE" font-family="sans-serif" font-size="13" font-weight="500">Response Parser</text>
      </g>
    </g>

    <g>
      <rect x="440" y="140" width="180" height="312" rx="12" fill="#633806" stroke="#FAC775" stroke-width="0.5"/>
      <text x="530" y="166" text-anchor="middle" fill="#FAEEDA" font-family="sans-serif" font-size="13" font-weight="500">Tools &amp; API</text>

      <g>
        <rect x="460" y="184" width="140" height="44" rx="8" fill="#412402" stroke="#FAC775" stroke-width="0.5"/>
        <text x="530" y="206" text-anchor="middle" dominant-baseline="central" fill="#FAEEDA" font-family="sans-serif" font-size="13" font-weight="500">File Operations</text>
      </g>
      <g>
        <rect x="460" y="240" width="140" height="44" rx="8" fill="#412402" stroke="#FAC775" stroke-width="0.5"/>
        <text x="530" y="262" text-anchor="middle" dominant-baseline="central" fill="#FAEEDA" font-family="sans-serif" font-size="13" font-weight="500">Bash Executor</text>
      </g>
      <g>
        <rect x="460" y="296" width="140" height="44" rx="8" fill="#412402" stroke="#FAC775" stroke-width="0.5"/>
        <text x="530" y="318" text-anchor="middle" dominant-baseline="central" fill="#FAEEDA" font-family="sans-serif" font-size="13" font-weight="500">Search &amp; Glob</text>
      </g>
      <g>
        <rect x="460" y="352" width="140" height="44" rx="8" fill="#412402" stroke="#FAC775" stroke-width="0.5"/>
        <text x="530" y="374" text-anchor="middle" dominant-baseline="central" fill="#FAEEDA" font-family="sans-serif" font-size="13" font-weight="500">Claude API</text>
      </g>
    </g>

    <path d="M240 296 L250 296" fill="none" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
    <path d="M430 296 L440 296" fill="none" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
    <path d="M250 408 L240 408" fill="none" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
    <path d="M440 408 L430 408" fill="none" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
  </g>
</svg>
