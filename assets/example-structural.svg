<svg viewBox="0 0 680 420" width="100%" role="img">
  <title>Example structural diagram — dark theme</title>
  <desc>A nested-container structural diagram showing outermost container with two inner regions, demonstrating rx, padding, and nested fill stops.</desc>
  <defs>
    <marker id="arrow2" viewBox="0 0 10 10" refX="8" refY="5"
      markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke"
        stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <text x="340" y="32" text-anchor="middle" fill="#E1F5EE" font-family="sans-serif" font-size="15" font-weight="500">Service architecture</text>
  <text x="340" y="50" text-anchor="middle" fill="#5DCAA5" font-family="sans-serif" font-size="12">Gateway contains two subsystems</text>

  <g>
    <rect x="60" y="72" width="560" height="320" rx="20" fill="#085041" stroke="#5DCAA5" stroke-width="0.5"/>
    <text x="80" y="100" fill="#E1F5EE" font-family="sans-serif" font-size="14" font-weight="500">API Gateway</text>
    <text x="80" y="118" fill="#5DCAA5" font-family="sans-serif" font-size="12">Routing &amp; auth</text>

    <g>
      <rect x="84" y="140" width="252" height="232" rx="12" fill="#04342C" stroke="#5DCAA5" stroke-width="0.5"/>
      <text x="210" y="166" text-anchor="middle" fill="#E1F5EE" font-family="sans-serif" font-size="13" font-weight="500">Auth service</text>

      <g>
        <rect x="104" y="184" width="212" height="44" rx="8" fill="#0C447C" stroke="#85B7EB" stroke-width="0.5"/>
        <text x="210" y="206" text-anchor="middle" dominant-baseline="central" fill="#E6F1FB" font-family="sans-serif" font-size="13" font-weight="500">Token validator</text>
      </g>
      <g>
        <rect x="104" y="240" width="212" height="44" rx="8" fill="#0C447C" stroke="#85B7EB" stroke-width="0.5"/>
        <text x="210" y="262" text-anchor="middle" dominant-baseline="central" fill="#E6F1FB" font-family="sans-serif" font-size="13" font-weight="500">Session store</text>
      </g>
      <g>
        <rect x="104" y="296" width="212" height="44" rx="8" fill="#0C447C" stroke="#85B7EB" stroke-width="0.5"/>
        <text x="210" y="318" text-anchor="middle" dominant-baseline="central" fill="#E6F1FB" font-family="sans-serif" font-size="13" font-weight="500">OAuth bridge</text>
      </g>
    </g>

    <g>
      <rect x="344" y="140" width="252" height="232" rx="12" fill="#3D2A0A" stroke="#FAC775" stroke-width="0.5"/>
      <text x="470" y="166" text-anchor="middle" fill="#FAEEDA" font-family="sans-serif" font-size="13" font-weight="500">Data service</text>

      <g>
        <rect x="364" y="184" width="212" height="44" rx="8" fill="#633806" stroke="#FAC775" stroke-width="0.5"/>
        <text x="470" y="206" text-anchor="middle" dominant-baseline="central" fill="#FAEEDA" font-family="sans-serif" font-size="13" font-weight="500">Query engine</text>
      </g>
      <g>
        <rect x="364" y="240" width="212" height="44" rx="8" fill="#633806" stroke="#FAC775" stroke-width="0.5"/>
        <text x="470" y="262" text-anchor="middle" dominant-baseline="central" fill="#FAEEDA" font-family="sans-serif" font-size="13" font-weight="500">Cache layer</text>
      </g>
      <g>
        <rect x="364" y="296" width="212" height="44" rx="8" fill="#633806" stroke="#FAC775" stroke-width="0.5"/>
        <text x="470" y="318" text-anchor="middle" dominant-baseline="central" fill="#FAEEDA" font-family="sans-serif" font-size="13" font-weight="500">Persistence</text>
      </g>
    </g>

    <path d="M336 254 L360 254" fill="none" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow2)"/>
  </g>
</svg>
