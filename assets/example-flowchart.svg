<svg viewBox="0 0 680 360" width="680" height="360" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Example flowchart — dark theme</title>
  <desc>A three-node vertical flowchart demonstrating dark-theme color application, arrow markers, text baselines, and viewBox sizing.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5"
      markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke"
        stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <text x="340" y="32" text-anchor="middle" fill="#E1F5EE" font-family="sans-serif" font-size="15" font-weight="500">Deploy pipeline</text>
  <text x="340" y="50" text-anchor="middle" fill="#5DCAA5" font-family="sans-serif" font-size="12">Build → Test → Release</text>

  <g>
    <rect x="240" y="72" width="200" height="56" rx="8" fill="#085041" stroke="#5DCAA5" stroke-width="0.5"/>
    <text x="340" y="94" text-anchor="middle" dominant-baseline="central" fill="#E1F5EE" font-family="sans-serif" font-size="14" font-weight="500">Build</text>
    <text x="340" y="114" text-anchor="middle" dominant-baseline="central" fill="#5DCAA5" font-family="sans-serif" font-size="12">Compile &amp; bundle</text>
  </g>

  <line x1="340" y1="128" x2="340" y2="168" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

  <g>
    <rect x="220" y="170" width="240" height="56" rx="8" fill="#0C447C" stroke="#85B7EB" stroke-width="0.5"/>
    <text x="340" y="192" text-anchor="middle" dominant-baseline="central" fill="#E6F1FB" font-family="sans-serif" font-size="14" font-weight="500">Test</text>
    <text x="340" y="212" text-anchor="middle" dominant-baseline="central" fill="#85B7EB" font-family="sans-serif" font-size="12">Unit + integration suite</text>
  </g>

  <line x1="340" y1="226" x2="340" y2="266" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

  <g>
    <rect x="240" y="268" width="200" height="56" rx="8" fill="#633806" stroke="#FAC775" stroke-width="0.5"/>
    <text x="340" y="290" text-anchor="middle" dominant-baseline="central" fill="#FAEEDA" font-family="sans-serif" font-size="14" font-weight="500">Release</text>
    <text x="340" y="310" text-anchor="middle" dominant-baseline="central" fill="#FAC775" font-family="sans-serif" font-size="12">Publish to registry</text>
  </g>
</svg>
