<svg viewBox="0 0 680 180" width="680" height="180" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Visualizer Skill Pipeline</title>
  <desc>A horizontal flowchart showing the four stages of the visualizer skill: user request, theme detection, visual generation, and rendered output.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5"
      markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke"
        stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <text x="340" y="32" text-anchor="middle" fill="#E1F5EE" font-family="sans-serif" font-size="15" font-weight="500">Visualizer Skill Pipeline</text>
  <text x="340" y="50" text-anchor="middle" fill="#5DCAA5" font-family="sans-serif" font-size="12">From user request to rendered visual</text>

  <g>
    <rect x="40" y="92" width="120" height="56" rx="8" fill="#085041" stroke="#5DCAA5" stroke-width="0.5"/>
    <text x="100" y="114" text-anchor="middle" dominant-baseline="central" fill="#E1F5EE" font-family="sans-serif" font-size="14" font-weight="500">User Request</text>
    <text x="100" y="134" text-anchor="middle" dominant-baseline="central" fill="#5DCAA5" font-family="sans-serif" font-size="12">"show me X"</text>
  </g>

  <line x1="160" y1="120" x2="200" y2="120" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

  <g>
    <rect x="200" y="92" width="120" height="56" rx="8" fill="#085041" stroke="#5DCAA5" stroke-width="0.5"/>
    <text x="260" y="114" text-anchor="middle" dominant-baseline="central" fill="#E1F5EE" font-family="sans-serif" font-size="14" font-weight="500">Detect Theme</text>
    <text x="260" y="134" text-anchor="middle" dominant-baseline="central" fill="#5DCAA5" font-family="sans-serif" font-size="12">dark or light</text>
  </g>

  <line x1="320" y1="120" x2="360" y2="120" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

  <g>
    <rect x="360" y="92" width="120" height="56" rx="8" fill="#633806" stroke="#FAC775" stroke-width="0.5"/>
    <text x="420" y="114" text-anchor="middle" dominant-baseline="central" fill="#FAEEDA" font-family="sans-serif" font-size="14" font-weight="500">Generate</text>
    <text x="420" y="134" text-anchor="middle" dominant-baseline="central" fill="#FAC775" font-family="sans-serif" font-size="12">design system</text>
  </g>

  <line x1="480" y1="120" x2="520" y2="120" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

  <g>
    <rect x="520" y="92" width="120" height="56" rx="8" fill="#633806" stroke="#FAC775" stroke-width="0.5"/>
    <text x="580" y="114" text-anchor="middle" dominant-baseline="central" fill="#FAEEDA" font-family="sans-serif" font-size="14" font-weight="500">Render</text>
    <text x="580" y="134" text-anchor="middle" dominant-baseline="central" fill="#FAC775" font-family="sans-serif" font-size="12">SVG / HTML / MD</text>
  </g>
</svg>
